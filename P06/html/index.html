<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Ping</title>
  </head>
  <body style="background-color: white;">
    <h1>SEQ2 Server</h1>
    <p>Access to the server</p>
    <hr>
    <form action="ping" method="get">
      <p>Is the server alive? <input type="submit" value="Ping"></p>
      <hr>
    </form>
    <form action="get" method="get">
      <p>Get a sequence. Select sequence number
      <select name="number">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
      <input type="submit" value="GET"></p>
      <hr>
    </form>
    <form action="gene" method="get">
      <p>Get a gene. Select the name
      <select name="genes">
        <option value="ADA">ADA</option>
        <option value="FRAT1">FRAT1</option>
        <option value="FXN">FXN</option>
        <option value="RNU6_269P">RNU6_269P</option>
        <option value="U5">U5</option>
      </select>
      <input type="submit" value="GENE"></p>
      <hr>
    </form>
    <form action="operation" method="get">
      Write a sequence:  <input type="text" name="msg">
      <br><br>
      Select operation
      <input type="radio" name="operation" value="Info" checked> Info
      <input type="radio" name="operation" value="Comp"> Comp
      <input type="radio" name="operation" value="Rev"> Rev
        <br><br>
      <p>Perform operation:
        <input type="submit" value="OPERATE!"/></p>
      <hr>
    </form>
  </body>
</html>
